kind = "web"
previewPath = "/"
title = "Rise-Up Bible Church"
version = "1.0.0"
id = "artifacts/rise-up-church"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24113

[services.development]
run = "pnpm --filter @workspace/rise-up-church run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rise-up-church", "run", "build" ]
publicDir = "artifacts/rise-up-church/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24113"
BASE_PATH = "/"
